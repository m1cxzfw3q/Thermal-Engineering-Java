item.temod-nuclearFuelRod.description = 由铀合成的核燃料棒，具有高放射性

#-炮台-#
block.temod-machineCannon.name = 机炮
block.temod-machineCannon.description = 向敌人快速发射子弹，弹容较高
block.temod-machineCannon.details = [red]后 勤 杀 手

block.temod-missileLauncher.name = 导弹发射井
block.temod-missileLauncher.description = 一台导弹发射井，可以发射导弹，需要电力
block.temod-missileLauncher.details = 在保留便携式导弹发射井优点的同时，修改为非一次性，更适合开普勒前期防线体质:)\n-这么高的火力只是前期???????????

block.temod-portableMissileLaunchSilo.name = 便携式导弹发射井
block.temod-portableMissileLaunchSilo.description = 一台便携式导弹发射井
block.temod-portableMissileLaunchSilo.details = 即建即用，无需装填，反应极快，瞬间发射，附带追踪，造价低廉，威力极高，乃是前期防御的最佳选择\n-进攻图必ban神器:)

#-生产-基础-#
block.temod-highEfficiencyDisassembler.name = 高效解离机
block.temod-highEfficiencyDisassembler.description = 将矿渣分离为物资，附带基础工厂\n可以额外生产物资
block.temod-highEfficiencyDisassembler.details = 这东西是怎么做到在占地极小的情况下高速生产这么多种物资的?????\n-你说的对，但是，有了这东西，我们以后即使在一片矿渣海上，也可以快速生产物资，这对我们没什么坏处

