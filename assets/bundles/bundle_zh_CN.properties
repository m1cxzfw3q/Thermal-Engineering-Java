#-生产-芯片-#
block.temod-chipManufacturingMachine.name = 芯片制造机
block.temod-chipManufacturingMachine.description = 使用"较为古老"的技术制造芯片,需要电力
block.temod-chipManufacturingMachine.details = 这种制造技术已经过时，据观察，开普勒上的原住民正在使用另一种我们尚且不知的方式量产芯片
block.temod-chipPrinter.name = 芯片打印机
block.temod-chipPrinter.description = 使用先进的技术量产芯片,需要电力及冷冻液
block.temod-chipPrinter.details = 开普勒原住民们使用的芯片制造技术，制造速度比过时的技术快了不是一点半点

#-区块-#
sector.temod-LandingArea.name = 降落区
sector.temod-LandingArea.description = 我们发现了一颗新的行星，这颗星球上面还有一些Erekir的矿物，占领这里以进行进一步研究
sector.temod-ResearchAreaNo47.name = 47号研究区
sector.temod-ResearchAreaNo47.description = 我们发现了一片研究区，上方好像还有一些残留的实验设施，占领这里以进行进一步研究

#-星球-#
planet.temod-keppler.name = 开普勒
planet.temod-keppler.description = 开普勒,一颗环境特殊的星球，气压与温度处于赛普罗与埃里克尔之间\n但是它实际上与太阳非常遥远，我们不知道这种环境是如何产生的\n如果这里的原住民拥有[red]改变目标星球气候[white]的能力......

